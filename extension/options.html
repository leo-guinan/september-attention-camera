<!doctype html><html><head><meta charset="utf-8"><style>body{max-width:720px;background:#0e0c08;color:#f2ede3;font:14px system-ui;margin:0;padding:24px}label{display:block;margin:14px 0;color:#b8b2a6}input{width:100%;padding:9px;background:#161209;color:#f2ede3;border:1px solid rgba(232,181,75,.3);border-radius:7px}button{background:#e8b54b;border:0;border-radius:7px;padding:10px 14px;color:#201605;font-weight:700;margin:4px 8px 4px 0}.secondary{background:transparent;color:#e8b54b;border:1px solid rgba(232,181,75,.35)}.note{color:#b8b2a6;line-height:1.5}.small{font-size:12px;color:#8f887c}</style></head><body><h1>MetaSPN Attention Sensor Options</h1><p class="note">This extension records visible page receipts from opted-in browsers only. It does not see private platform analytics unless the page renders them to you. Add a Quai payout address if you want first-seen tweet bounties credited to a wallet.</p><label><input type="checkbox" id="enabled"> Enabled</label><label>Operator label <input id="operatorLabel" placeholder="anonymous-sensor"></label><label>Quai payout address <input id="quaiPayoutAddress" placeholder="0x…"><span class="small">Included in exported/reported receipts. Never enter a private key or seed phrase.</span></label><label>Live report URL <input id="reportUrl" placeholder="leave blank for local-only"></label><button id="useOfficial" class="secondary">Use official inbound endpoint</button><button id="clearReport" class="secondary">Local-only mode</button><br><button id="save">Save</button><span id="saved"></span><script src="options.js"></script></body></html>
